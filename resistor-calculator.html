<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>抵抗値カラーコード計算機</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700&family=Newsreader:opsz,wght@6..72,400;6..72,500&display=swap" rel="stylesheet">
<style>
  :root {
    /* — Anthropic調 ウォーム・ニュートラル — */
    --bg:#F1EEE5; --ground:#E6E1D4; --surface:#FCFBF7; --surface2:#F2EFE6; --surface3:#EAE4D5;
    --accent:#BE5A38; --accent-dim:#D69B81; --accent-soft:#F3E5DA; --accent-line:#E6C3B0;
    --text:#211F1A; --text-dim:#716C61; --text-bright:#100F0B;
    --success:#4f6b3a; --warning:#9a5a22; --error:#b23a2e;
    --border:#E2DCCD;
    --serif:'Newsreader','Hiragino Mincho ProN','Yu Mincho','YuMincho',Georgia,serif;
    --sans:'Hanken Grotesk','Hiragino Kaku Gothic ProN','Meiryo','Yu Gothic',system-ui,sans-serif;
    --mono:'JetBrains Mono','SFMono-Regular','Consolas','Courier New',monospace;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html { background: var(--ground); min-height: 100vh; padding: 26px 0 60px; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: var(--sans);
    -webkit-font-smoothing: antialiased;
    text-rendering: optimizeLegibility;
    display: flex;
    flex-direction: column;
    width: 840px;
    min-width: 840px;
    margin: 0 auto;
    border: 1px solid var(--border);
    border-radius: 14px;
    box-shadow: 0 1px 2px rgba(50,38,24,.04), 0 22px 48px -30px rgba(50,38,24,.30);
  }

  /* ── ヘッダー ── */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 18px 26px;
    display: flex; align-items: center; justify-content: space-between; gap: 16px;
    flex-shrink: 0;
    border-radius: 13px 13px 0 0;
  }
  .brand { display: flex; align-items: center; gap: 13px; min-width: 0; }
  .brand .mark { flex-shrink: 0; }
  header h1 {
    font-family: var(--sans); font-weight: 700; font-size: 1.32rem;
    color: var(--text); letter-spacing: .005em; line-height: 1.15;
  }
  .tagline { font-size: .78rem; color: var(--text-dim); margin-top: 3px; }

  /* 帯数トグル */
  .band-toggle {
    display: flex; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 9px; padding: 2px; gap: 2px; flex-shrink: 0;
  }
  .band-toggle button {
    background: none; border: none; color: var(--text-dim); cursor: pointer;
    padding: 6px 16px; font-family: var(--sans); font-size: .82rem; font-weight: 600;
    border-radius: 7px; transition: .14s;
  }
  .band-toggle button.active { background: var(--accent-soft); color: var(--accent); box-shadow: inset 0 0 0 1px var(--accent-line); }
  .band-toggle button:hover:not(.active) { color: var(--text); }

  /* ── メインエリア ── */
  main { flex: 1; display: flex; flex-direction: column; padding: 30px 26px 36px; gap: 18px; }

  /* ── 抵抗SVGエリア ── */
  .resistor-area {
    background: var(--surface); border: 1px solid var(--border); border-radius: 11px;
    padding: 30px 20px 18px; display: flex; flex-direction: column; align-items: center; gap: 12px;
  }
  #resistor-svg { overflow: visible; }
  .band-label-row { position: relative; }

  /* ── 中段 ── */
  .middle-row { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .hint-panel { display: flex; flex-direction: column; }
  .hint-panel, .result-panel {
    background: var(--surface); border: 1px solid var(--border); border-radius: 11px; padding: 20px;
  }

  .hint-panel h2, .result-panel h2, .palette-area h2 {
    font-family: var(--sans); font-weight: 600; font-size: .9rem; color: var(--text);
    letter-spacing: .01em; margin-bottom: 13px; border-bottom: 1px solid var(--border); padding-bottom: 9px;
  }

  .hint-panel ol {
    flex: 1; display: flex; flex-direction: column; justify-content: space-evenly;
    padding-left: 1.3em; color: var(--text-dim); font-size: .86rem; line-height: 1.5;
  }
  .hint-panel ol li { padding: 3px 0; }
  .hint-panel ol li span { color: var(--accent); font-weight: 600; }

  .result-value {
    font-family: var(--mono); font-size: 2.3rem; color: var(--text-bright); font-weight: 700;
    letter-spacing: -.01em; line-height: 1.1; margin-top: 4px;
  }
  .result-value.placeholder { color: var(--text-dim); font-size: 1.9rem; }

  .result-tolerance {
    margin-top: 8px; font-family: var(--mono); font-size: 1.02rem; color: var(--accent);
    font-weight: 700; min-height: 1.6rem;
  }
  .result-range {
    margin-top: 8px; font-size: .8rem; color: var(--text-dim); line-height: 1.8;
    background: var(--surface2); border: 1px solid var(--border); border-radius: 7px; padding: 7px 11px; min-height: 52px;
  }
  .result-range span { font-family: var(--mono); color: var(--text); font-weight: 700; }

  .reset-btn {
    margin-top: 14px; background: var(--surface); border: 1px solid var(--border); color: var(--text-dim);
    padding: 7px 18px; border-radius: 8px; cursor: pointer; font-family: var(--sans); font-size: .82rem;
    font-weight: 500; transition: .14s;
  }
  .reset-btn:hover { background: var(--accent-soft); color: var(--accent); border-color: var(--accent-line); }

  /* 単位トグル */
  .unit-toggle {
    display: inline-flex; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 8px; padding: 2px; gap: 2px; margin-bottom: 10px;
  }
  .unit-btn {
    background: none; border: none; color: var(--text-dim); cursor: pointer;
    padding: 5px 15px; font-family: var(--sans); font-size: .8rem; font-weight: 600;
    border-radius: 6px; transition: .14s;
  }
  .unit-btn.active { background: var(--accent-soft); color: var(--accent); box-shadow: inset 0 0 0 1px var(--accent-line); }
  .unit-btn:hover:not(.active) { color: var(--text); }

  /* ── 色パレット ── */
  .palette-area {
    background: var(--surface); border: 1px solid var(--border); border-radius: 11px;
    padding: 16px 20px; flex-shrink: 0;
  }
  .palette-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(118px, 1fr)); gap: 8px; }
  .palette-divider { grid-column: 1 / -1; height: 1px; background: var(--border); margin: 5px 0; }

  .color-chip {
    display: flex; align-items: center; gap: 9px; padding: 9px 12px;
    background: var(--surface2); border: 1px solid var(--border); border-radius: 8px;
    cursor: grab; transition: .12s; user-select: none;
  }
  .color-chip:hover { border-color: var(--accent-dim); transform: translateY(-2px); box-shadow: 0 5px 12px -4px rgba(60,45,28,.22); }
  .color-chip:active { cursor: grabbing; }
  .color-chip.dragging { opacity: .4; transform: scale(.93); }

  .chip-swatch {
    width: 24px; height: 24px; border-radius: 5px; flex-shrink: 0;
    border: 1px solid rgba(0,0,0,.15); box-shadow: inset 0 1px 1px rgba(255,255,255,.3);
  }
  .chip-swatch.is-gold {
    background: linear-gradient(160deg, #ffe566 0%, #cfb53b 35%, #ffd700 55%, #b8860b 100%);
    box-shadow: inset 0 1px 2px rgba(255,255,255,0.6), 0 1px 3px rgba(120,90,0,0.4);
    border-color: #b8860b;
  }
  .chip-swatch.is-silver {
    background: linear-gradient(160deg, #f0f0f0 0%, #b0b0b8 35%, #e0e0e8 55%, #686870 100%);
    box-shadow: inset 0 1px 2px rgba(255,255,255,0.8), 0 1px 3px rgba(80,80,100,0.3);
    border-color: #909098;
  }

  .chip-name { font-size: .86rem; color: var(--text); font-weight: 600; min-width: 1.8em; }
  .chip-val { font-family: var(--mono); font-size: .82rem; color: var(--text-dim); margin-left: auto; }

  .band-drop { cursor: crosshair; }

  footer {
    font-size: .72rem; color: var(--text-dim); text-align: center;
    padding: 14px; border-top: 1px solid var(--border); border-radius: 0 0 13px 13px;
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <svg class="mark" width="42" height="20" viewBox="0 0 48 22" aria-hidden="true">
      <line x1="2" y1="11" x2="13" y2="11" stroke="#9aa0a8" stroke-width="2"/>
      <line x1="35" y1="11" x2="46" y2="11" stroke="#9aa0a8" stroke-width="2"/>
      <rect x="13" y="4" width="22" height="14" rx="3" fill="#dcc7a0" stroke="#b09a6e" stroke-width="1"/>
      <rect x="17.5" y="4" width="2.6" height="14" fill="#8B4513"/>
      <rect x="22.7" y="4" width="2.6" height="14" fill="#BE5A38"/>
      <rect x="27.9" y="4" width="2.6" height="14" fill="#CC0000"/>
    </svg>
    <div>
      <h1>抵抗値カラーコード計算機</h1>
      <p class="tagline">カラーバンドから抵抗値を読み解く</p>
    </div>
  </div>
  <div class="band-toggle">
    <button id="btn4" class="active" onclick="setBandMode(4)">4本帯</button>
    <button id="btn5" onclick="setBandMode(5)">5本帯</button>
  </div>
</header>

<main>
  <div class="resistor-area">
    <svg id="resistor-svg" width="500" height="120" viewBox="0 0 500 120"></svg>
    <div id="band-labels" class="band-label-row"></div>
  </div>

  <div class="middle-row">
    <div class="hint-panel">
      <h2>使い方</h2>
      <ol>
        <li>下のパレットから<span>色チップをドラッグ</span></li>
        <li>抵抗の帯ゾーンに<span>ドロップ</span></li>
        <li>全帯を埋めると<span>抵抗値を表示</span></li>
        <li>金・銀は<span>乗数帯・許容差帯専用</span></li>
      </ol>
    </div>
    <div class="result-panel">
      <h2>計算結果</h2>
      <div class="unit-toggle">
        <button id="btn-ko" class="unit-btn active" onclick="setUnit('kΩ')">kΩ</button>
        <button id="btn-o"  class="unit-btn"        onclick="setUnit('Ω')">Ω</button>
      </div>
      <div id="result-value" class="result-value placeholder">— Ω</div>
      <div id="result-tolerance" class="result-tolerance"></div>
      <div id="result-range" class="result-range"></div>
      <button class="reset-btn" onclick="resetAll()">⟳ リセット</button>
    </div>
  </div>

  <div class="palette-area">
    <h2>カラーパレット — ドラッグして帯へ</h2>
    <div id="palette-grid" class="palette-grid"></div>
  </div>
</main>

<footer>カラーコードは JIS C 5062 / IEC 60062 準拠。実機では必ずテスターでも確認してください。</footer>

<script>
const COLORS = [
  { name:'黒', hex:'#1a1a1a', digit:0,    multiplier:1,       tolerance:null },
  { name:'茶', hex:'#8B4513', digit:1,    multiplier:10,      tolerance:1    },
  { name:'赤', hex:'#CC0000', digit:2,    multiplier:100,     tolerance:2    },
  { name:'橙', hex:'#DD7700', digit:3,    multiplier:1000,    tolerance:null },
  { name:'黄', hex:'#EEC900', digit:4,    multiplier:10000,   tolerance:null },
  { name:'緑', hex:'#228B22', digit:5,    multiplier:100000,  tolerance:0.5  },
  { name:'青', hex:'#1155DD', digit:6,    multiplier:1e6,     tolerance:0.25 },
  { name:'紫', hex:'#8800CC', digit:7,    multiplier:1e7,     tolerance:0.1  },
  { name:'灰', hex:'#909098', digit:8,    multiplier:1e8,     tolerance:0.05 },
  { name:'白', hex:'#e8e8ec', digit:9,    multiplier:1e9,     tolerance:null },
  { name:'金', hex:'#CFB53B', digit:null, multiplier:0.1,     tolerance:5    },
  { name:'銀', hex:'#A8A8B8', digit:null, multiplier:0.01,    tolerance:10   },
];

const COLOR_MAP = Object.fromEntries(COLORS.map(c => [c.name, c]));

let bandMode = 4;
let displayUnit = 'kΩ';
let bands = [];
let draggingColor = null;

// SVG定数
const SVG_W = 500, SVG_H = 120;
const CX = SVG_W / 2;           // 250
const CY = SVG_H / 2;           // 60
const BW     = 255;              // 胴体幅（1.5倍）
const BX     = CX - BW / 2;     // 122.5
const BX_END = CX + BW / 2;     // 377.5
const END_HH = 40;               // 端の半高さ（1.5倍）
const CONCAV = 30;               // くびれの深さ（1.5倍）
const LCX    = BX  + END_HH;    // 左円中心X = 162.5
const RCX    = BX_END - END_HH; // 右円中心X = 337.5
const BY     = CY - END_HH;     // 本体上端Y = 20
const BAND_W = 24;               // 帯幅

function getBandMeta(mode) {
  if (mode === 4) return [
    { label:'第1桁',  type:'digit'      },
    { label:'第2桁',  type:'digit'      },
    { label:'乗数',   type:'multiplier' },
    { label:'許容差', type:'tolerance'  },
  ];
  return [
    { label:'第1桁',  type:'digit'      },
    { label:'第2桁',  type:'digit'      },
    { label:'第3桁',  type:'digit'      },
    { label:'乗数',   type:'multiplier' },
    { label:'許容差', type:'tolerance'  },
  ];
}

function getBandX(i, total) {
  const innerLeft  = LCX + 4;
  const innerRight = RCX - 4;
  const usable = innerRight - innerLeft;
  const step = total > 1 ? usable / (total - 1) : 0;
  return innerLeft + step * i - BAND_W / 2;
}

function renderSVG() {
  const svg = document.getElementById('resistor-svg');
  const meta = getBandMeta(bandMode);
  const total = meta.length;

  // ∞ 型パス: 両端が丸く、中央がくびれた形
  const BYB   = BY + END_HH * 2;        // 77（本体下端）
  const shape = `M ${LCX},${BY} Q ${CX},${BY+CONCAV} ${RCX},${BY} A ${END_HH},${END_HH} 0 0,1 ${RCX},${BYB} Q ${CX},${BYB-CONCAV} ${LCX},${BYB} A ${END_HH},${END_HH} 0 0,1 ${LCX},${BY} Z`;

  let html = `<defs>
    <clipPath id="body-clip"><path d="${shape}"/></clipPath>
    <linearGradient id="body-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ecdcb8"/>
      <stop offset="28%"  stop-color="#d4c4a0"/>
      <stop offset="68%"  stop-color="#bcaa88"/>
      <stop offset="100%" stop-color="#a89470"/>
    </linearGradient>
    <linearGradient id="body-shine" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.50)"/>
      <stop offset="38%"  stop-color="rgba(255,255,255,0.0)"/>
    </linearGradient>
    <linearGradient id="gold-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#ffe880"/>
      <stop offset="22%"  stop-color="#f0c030"/>
      <stop offset="46%"  stop-color="#c88800"/>
      <stop offset="54%"  stop-color="#e8c428"/>
      <stop offset="78%"  stop-color="#b07800"/>
      <stop offset="100%" stop-color="#7a5000"/>
    </linearGradient>
    <linearGradient id="silver-grad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#f4f4f8"/>
      <stop offset="22%"  stop-color="#c0c0d0"/>
      <stop offset="46%"  stop-color="#888898"/>
      <stop offset="54%"  stop-color="#d0d0e0"/>
      <stop offset="78%"  stop-color="#9898a8"/>
      <stop offset="100%" stop-color="#505060"/>
    </linearGradient>
  </defs>`;

  // リード線（胴体左右端から外へ）
  html += `<line x1="0" y1="${CY}" x2="${BX}" y2="${CY}" stroke="#9098a8" stroke-width="2.5" stroke-linecap="round"/>`;
  html += `<line x1="${BX_END}" y1="${CY}" x2="${SVG_W}" y2="${CY}" stroke="#9098a8" stroke-width="2.5" stroke-linecap="round"/>`;

  // 胴体（∞型、グラデーション）
  html += `<path d="${shape}" fill="url(#body-grad)" stroke="#a09070" stroke-width="1.2"/>`;

  // 帯（clipPathで胴体内にクリップ）
  html += `<g clip-path="url(#body-clip)">`;
  for (let i = 0; i < total; i++) {
    const bx = getBandX(i, total);
    const name = bands[i];
    const id = `band-${i}`;
    let fillAttr, strokeAttr;
    if (name) {
      if (name === '金')      fillAttr = `fill="url(#gold-grad)"`;
      else if (name === '銀') fillAttr = `fill="url(#silver-grad)"`;
      else                    fillAttr = `fill="${COLOR_MAP[name].hex}"`;
      strokeAttr = `stroke="rgba(0,0,0,0.22)" stroke-width="0.8"`;
    } else {
      fillAttr   = `fill="rgba(190,90,56,0.12)"`;
      strokeAttr = `stroke="rgba(190,90,56,0.55)" stroke-width="1.5" stroke-dasharray="3 2.5"`;
    }
    html += `<rect id="${id}" x="${bx}" y="${BY-4}" width="${BAND_W}" height="${END_HH*2+8}" ${fillAttr} ${strokeAttr} class="band-drop" data-index="${i}"/>`;
  }
  html += `</g>`;

  // 胴体ハイライト
  html += `<path d="${shape}" fill="url(#body-shine)" pointer-events="none"/>`;

  svg.innerHTML = html;

  for (let i = 0; i < total; i++) {
    const el = document.getElementById(`band-${i}`);
    const idx = i;
    el.addEventListener('dragover', e => {
      e.preventDefault();
      el.setAttribute('stroke', '#BE5A38');
      el.setAttribute('stroke-width', '2.5');
      el.removeAttribute('stroke-dasharray');
      el.setAttribute('fill', bands[idx] ? el.getAttribute('fill') : 'rgba(190,90,56,0.28)');
    });
    el.addEventListener('dragleave', () => restoreBandStyle(el, idx));
    el.addEventListener('drop', e => {
      e.preventDefault();
      restoreBandStyle(el, idx);
      if (!draggingColor) return;
      if (tryDropBand(idx, draggingColor)) {
        renderSVG(); renderLabels(); calculate();
      } else {
        flashError(el, idx);
      }
    });
  }

  renderLabels();
}

function restoreBandStyle(el, idx) {
  if (bands[idx]) {
    el.setAttribute('stroke', 'rgba(0,0,0,0.22)');
    el.setAttribute('stroke-width', '0.8');
    el.removeAttribute('stroke-dasharray');
  } else {
    el.setAttribute('fill', 'rgba(190,90,56,0.12)');
    el.setAttribute('stroke', 'rgba(190,90,56,0.55)');
    el.setAttribute('stroke-width', '1.5');
    el.setAttribute('stroke-dasharray', '3 2.5');
  }
}

function flashError(el, idx) {
  const orig = el.getAttribute('fill');
  el.setAttribute('fill', '#e05038');
  setTimeout(() => { el.setAttribute('fill', '#b23a2e'); }, 150);
  setTimeout(() => { el.setAttribute('fill', orig); }, 320);
}

function renderLabels() {
  const meta = getBandMeta(bandMode);
  const total = meta.length;
  const container = document.getElementById('band-labels');
  const svgEl = document.getElementById('resistor-svg');
  const svgRect = svgEl.getBoundingClientRect();
  const scaleX = svgRect.width / SVG_W;

  container.innerHTML = '';
  container.style.width = svgRect.width + 'px';
  container.style.height = '20px';

  for (let i = 0; i < total; i++) {
    const bx = getBandX(i, total);
    const cx = (bx + BAND_W / 2) * scaleX;
    const span = document.createElement('span');
    span.textContent = meta[i].label;
    span.style.cssText = `
      position: absolute;
      left: ${cx}px;
      transform: translateX(-50%);
      font-size: 0.68rem;
      color: var(--text-dim);
      white-space: nowrap;
    `;
    container.appendChild(span);
  }
}

function tryDropBand(index, colorName) {
  const meta = getBandMeta(bandMode);
  const type = meta[index].type;
  const color = COLOR_MAP[colorName];
  if (type === 'digit'     && color.digit     === null) return false;
  if (type === 'tolerance' && color.tolerance === null) return false;
  bands[index] = colorName;
  return true;
}

function calculate() {
  const meta = getBandMeta(bandMode);
  if (bands.some(b => !b)) { showPlaceholder(); return; }

  let value, tolerancePct;
  if (bandMode === 4) {
    value = (COLOR_MAP[bands[0]].digit * 10 + COLOR_MAP[bands[1]].digit) * COLOR_MAP[bands[2]].multiplier;
    tolerancePct = COLOR_MAP[bands[3]].tolerance;
  } else {
    value = (COLOR_MAP[bands[0]].digit * 100 + COLOR_MAP[bands[1]].digit * 10 + COLOR_MAP[bands[2]].digit) * COLOR_MAP[bands[3]].multiplier;
    tolerancePct = COLOR_MAP[bands[4]].tolerance;
  }
  showResult(value, tolerancePct);
}

function formatOhm(v) {
  if (displayUnit === 'kΩ') {
    const n = v / 1000;
    return (Number.isInteger(n) ? n : +n.toPrecision(4)) + ' kΩ';
  }
  return (Number.isInteger(v) ? v : +v.toPrecision(4)) + ' Ω';
}

function setUnit(u) {
  displayUnit = u;
  document.getElementById('btn-ko').classList.toggle('active', u === 'kΩ');
  document.getElementById('btn-o').classList.toggle('active', u === 'Ω');
  if (!bands.some(b => !b)) calculate();
}

function showResult(value, tolerancePct) {
  const elVal = document.getElementById('result-value');
  const elTol = document.getElementById('result-tolerance');
  const elRange = document.getElementById('result-range');
  elVal.classList.remove('placeholder');
  elVal.textContent = formatOhm(value);
  if (tolerancePct !== null) {
    elTol.textContent = `±${tolerancePct}%`;
    const lo = value * (1 - tolerancePct/100);
    const hi = value * (1 + tolerancePct/100);
    elRange.innerHTML = `範囲: <span>${formatOhm(lo)}</span> 〜 <span>${formatOhm(hi)}</span>`;
  } else {
    elTol.textContent = ''; elRange.textContent = '';
  }
}

function showPlaceholder() {
  const elVal = document.getElementById('result-value');
  elVal.classList.add('placeholder');
  elVal.textContent = '— Ω';
  document.getElementById('result-tolerance').textContent = '';
  document.getElementById('result-range').textContent = '';
}

function buildPalette() {
  const grid = document.getElementById('palette-grid');
  grid.innerHTML = '';
  COLORS.filter(c => c.digit !== null).forEach(c => grid.appendChild(makeChip(c, `${c.digit}`)));
  const div = document.createElement('div');
  div.className = 'palette-divider';
  grid.appendChild(div);
  COLORS.filter(c => c.digit === null).forEach(c => {
    grid.appendChild(makeChip(c, `±${c.tolerance}%`));
  });
}

function makeChip(color, valText) {
  const isGold   = color.name === '金';
  const isSilver = color.name === '銀';

  const div = document.createElement('div');
  div.className = 'color-chip' + (isGold?' is-gold':isSilver?' is-silver':'');
  div.draggable = true;
  div.dataset.colorName = color.name;

  const swatch = document.createElement('div');
  swatch.className = 'chip-swatch' + (isGold?' is-gold':isSilver?' is-silver':'');
  if (!isGold && !isSilver) {
    swatch.style.background = color.hex;
    if (color.name === '白') swatch.style.borderColor = '#aaa';
    if (color.name === '黒') swatch.style.borderColor = '#555';
  }

  const name = document.createElement('span');
  name.className = 'chip-name';
  name.textContent = color.name;

  const val = document.createElement('span');
  val.className = 'chip-val';
  val.textContent = valText;

  div.appendChild(swatch);
  div.appendChild(name);
  div.appendChild(val);

  div.addEventListener('dragstart', e => {
    draggingColor = color.name;
    div.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'copy';
  });
  div.addEventListener('dragend', () => {
    div.classList.remove('dragging');
    draggingColor = null;
  });
  return div;
}

function setBandMode(n) {
  bandMode = n;
  bands = new Array(n).fill(null);
  document.getElementById('btn4').classList.toggle('active', n === 4);
  document.getElementById('btn5').classList.toggle('active', n === 5);
  renderSVG();
  showPlaceholder();
}

function resetAll() {
  bands = new Array(bandMode).fill(null);
  renderSVG();
  showPlaceholder();
}

function init() {
  setBandMode(4);
  buildPalette();
  window.addEventListener('resize', renderLabels);
}

init();
</script>
</body>
</html>
