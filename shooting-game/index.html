<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>シューティングゲーム</title>
<style>
  body {
    margin: 0;
    background: #000;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    font-family: 'Courier New', monospace;
    color: #0f0;
  }
  h1 { margin: 10px; letter-spacing: 4px; }
  canvas {
    background: linear-gradient(180deg, #000 0%, #001 50%, #002 100%);
    border: 2px solid #0f0;
    box-shadow: 0 0 20px #0f0;
  }
  #info { margin-top: 10px; font-size: 14px; opacity: 0.8; }
  #overlay {
    position: absolute;
    color: #0f0;
    font-size: 32px;
    text-align: center;
    text-shadow: 0 0 10px #0f0;
    pointer-events: none;
    display: none;
  }
</style>
</head>
<body>
<h1>SHOOTING GAME</h1>
<div style="position: relative;">
  <canvas id="game" width="480" height="640"></canvas>
  <div id="overlay"></div>
</div>
<div id="info">← → 移動 / Space 弾発射 / R リスタート</div>

<script>
const canvas = document.getElementById('game');
const ctx = canvas.getContext('2d');
const overlay = document.getElementById('overlay');
const W = canvas.width, H = canvas.height;

const keys = {};
addEventListener('keydown', e => {
  keys[e.key] = true;
  if (e.key === ' ') e.preventDefault();
  if (e.key.toLowerCase() === 'r' && state.gameOver) reset();
});
addEventListener('keyup', e => keys[e.key] = false);

const state = {
  player: { x: W/2, y: H-60, w: 36, h: 28, cooldown: 0, invincible: 0 },
  bullets: [],
  enemies: [],
  enemyBullets: [],
  items: [],
  meteors: [],
  particles: [],
  stars: [],
  score: 0,
  lives: 3,
  spawnTimer: 0,
  meteorTimer: 180,
  gameOver: false,
  wave: 1,
  shake: 0,
};

for (let i = 0; i < 80; i++) {
  state.stars.push({
    x: Math.random()*W,
    y: Math.random()*H,
    speed: 0.5 + Math.random()*2,
    size: Math.random()*1.5 + 0.5,
  });
}

function reset() {
  state.player = { x: W/2, y: H-60, w: 36, h: 28, cooldown: 0, invincible: 0 };
  state.bullets = [];
  state.enemies = [];
  state.enemyBullets = [];
  state.items = [];
  state.meteors = [];
  state.particles = [];
  state.score = 0;
  state.lives = 3;
  state.spawnTimer = 0;
  state.meteorTimer = 180;
  state.gameOver = false;
  state.wave = 1;
  state.shake = 0;
  overlay.style.display = 'none';
}

function spawnEnemy() {
  const type = Math.random() < 0.2 ? 'fast' : 'normal';
  state.enemies.push({
    x: Math.random()*(W-40) + 20,
    y: -20,
    vx: (Math.random()-0.5)*1.5,
    vy: type === 'fast' ? 2.8 : 1.6,
    hp: type === 'fast' ? 1 : 2,
    shootTimer: Math.random()*120 + 60,
    type,
    w: type === 'fast' ? 18 : 30,
    h: type === 'fast' ? 34 : 26,
  });
}

function spawnMeteor() {
  const r = 30 + Math.random()*8;
  const bumps = [];
  const n = 10;
  for (let i = 0; i < n; i++) bumps.push(0.82 + Math.random()*0.22);
  const craters = [];
  for (let i = 0; i < 3; i++) {
    craters.push({
      x: (Math.random()-0.5)*0.9,
      y: (Math.random()-0.5)*0.9,
      s: 0.12 + Math.random()*0.1,
    });
  }
  state.meteors.push({
    x: Math.random()*(W-80) + 40,
    y: -r - 10,
    vx: (Math.random()-0.5)*1.0,
    vy: 1.2 + Math.random()*0.6,
    r,
    rot: Math.random()*Math.PI*2,
    vr: (Math.random()-0.5)*0.04,
    bumps,
    craters,
  });
}

function spawnParticles(x, y, color, count=12) {
  for (let i = 0; i < count; i++) {
    const a = Math.random() * Math.PI * 2;
    const s = Math.random() * 3 + 1;
    state.particles.push({
      x, y,
      vx: Math.cos(a)*s, vy: Math.sin(a)*s,
      life: 30, color,
    });
  }
}

function update() {
  if (state.gameOver) return;

  const p = state.player;
  if (keys['ArrowLeft']) p.x -= 5;
  if (keys['ArrowRight']) p.x += 5;
  if (keys['ArrowUp']) p.y -= 5;
  if (keys['ArrowDown']) p.y += 5;
  p.x = Math.max(p.w/2, Math.min(W-p.w/2, p.x));
  p.y = Math.max(p.h/2, Math.min(H-p.h/2, p.y));

  if (p.cooldown > 0) p.cooldown--;
  if (p.invincible > 0) p.invincible--;
  if (keys[' '] && p.cooldown <= 0) {
    state.bullets.push({ x: p.x, y: p.y-15, vy: -10 });
    p.cooldown = 10;
  }

  state.bullets = state.bullets.filter(b => {
    b.y += b.vy;
    return b.y > -10;
  });

  state.spawnTimer--;
  if (state.spawnTimer <= 0) {
    spawnEnemy();
    state.spawnTimer = Math.max(40, 120 - state.wave*6);
  }

  state.meteorTimer--;
  if (state.meteorTimer <= 0) {
    spawnMeteor();
    state.meteorTimer = 160 + Math.random()*120;
  }

  state.enemies.forEach(e => {
    e.x += e.vx;
    e.y += e.vy;
    if (e.x < 15 || e.x > W-15) e.vx *= -1;
    e.shootTimer--;
    if (e.shootTimer <= 0 && e.y < p.y - 140 && Math.random() < 0.5) {
      const dx = p.x - e.x, dy = p.y - e.y;
      const d = Math.hypot(dx, dy) || 1;
      state.enemyBullets.push({
        x: e.x, y: e.y,
        vx: dx/d*3, vy: dy/d*3,
      });
      e.shootTimer = 100 + Math.random()*80;
    }
  });

  state.enemyBullets = state.enemyBullets.filter(b => {
    b.x += b.vx;
    b.y += b.vy;
    for (const m of state.meteors) {
      if (Math.hypot(m.x-b.x, m.y-b.y) < m.r) {
        spawnParticles(b.x, b.y, '#888', 4);
        return false;
      }
    }
    if (Math.abs(b.x-p.x) < p.w/2 && Math.abs(b.y-p.y) < p.h/2) {
      hitPlayer();
      return false;
    }
    return b.y < H+10 && b.y > -10 && b.x > -10 && b.x < W+10;
  });

  state.meteors.forEach(m => {
    m.x += m.vx;
    m.y += m.vy;
    m.rot += m.vr;
    if (m.x < m.r || m.x > W-m.r) m.vx *= -1;
    const dx = m.x - p.x, dy = m.y - p.y;
    if (Math.hypot(dx, dy) < m.r + Math.min(p.w, p.h)*0.35) {
      hitPlayer();
    }
  });

  state.bullets.forEach(b => {
    for (const m of state.meteors) {
      if (Math.hypot(m.x-b.x, m.y-b.y) < m.r) {
        b.dead = true;
        spawnParticles(b.x, b.y, '#888', 4);
        return;
      }
    }
    state.enemies.forEach(e => {
      if (Math.abs(b.x-e.x) < e.w/2 && Math.abs(b.y-e.y) < e.h/2) {
        e.hp--;
        b.dead = true;
        spawnParticles(b.x, b.y, '#ff0', 4);
        if (e.hp <= 0) {
          e.dead = true;
          state.score += e.type === 'fast' ? 200 : 100;
          spawnParticles(e.x, e.y, e.type === 'fast' ? '#f0f' : '#f80', 16);
          if (Math.random() < 0.2) {
            state.items.push({ x: e.x, y: e.y, vy: 1.6, w: 18, h: 16 });
          }
          if (state.score > state.wave * 1000) state.wave++;
        }
      }
    });
  });

  state.enemies.forEach(e => {
    if (Math.abs(e.x-p.x) < (e.w+p.w)/2 && Math.abs(e.y-p.y) < (e.h+p.h)/2) {
      e.dead = true;
      hitPlayer();
      spawnParticles(e.x, e.y, '#f00', 20);
    }
  });

  state.bullets = state.bullets.filter(b => !b.dead);
  state.enemies = state.enemies.filter(e => !e.dead && e.y < H+30);

  state.meteors = state.meteors.filter(m => m.y < H + m.r + 20);

  state.items = state.items.filter(it => {
    it.y += it.vy;
    if (Math.abs(it.x-p.x) < (it.w+p.w)/2 && Math.abs(it.y-p.y) < (it.h+p.h)/2) {
      state.lives++;
      spawnParticles(it.x, it.y, '#0f8', 14);
      return false;
    }
    return it.y < H+20;
  });

  state.particles = state.particles.filter(pt => {
    pt.x += pt.vx;
    pt.y += pt.vy;
    pt.vx *= 0.95; pt.vy *= 0.95;
    pt.life--;
    return pt.life > 0;
  });

  state.stars.forEach(s => {
    s.y += s.speed;
    if (s.y > H) { s.y = 0; s.x = Math.random()*W; }
  });
}

function hitPlayer() {
  if (state.player.invincible > 0) return;
  state.lives--;
  state.player.invincible = 30;
  state.shake = 16;
  spawnParticles(state.player.x, state.player.y, '#0ff', 20);
  if (state.lives <= 0) {
    state.gameOver = true;
    overlay.innerHTML = 'GAME OVER<br><span style="font-size:18px">SCORE: '+state.score+'<br>Press R to restart</span>';
    overlay.style.display = 'block';
    overlay.style.top = (H/2 - 60) + 'px';
    overlay.style.left = '0';
    overlay.style.width = W + 'px';
  }
}

function drawShip(x, y, color) {
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.moveTo(x, y-14);
  ctx.lineTo(x-16, y+10);
  ctx.lineTo(x-6, y+6);
  ctx.lineTo(x, y+12);
  ctx.lineTo(x+6, y+6);
  ctx.lineTo(x+16, y+10);
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#fff';
  ctx.fillRect(x-2, y-4, 4, 8);
}

function drawMeteor(m) {
  ctx.save();
  ctx.translate(m.x, m.y);
  ctx.rotate(m.rot);
  ctx.fillStyle = '#6a5a4a';
  ctx.beginPath();
  const n = m.bumps.length;
  for (let i = 0; i < n; i++) {
    const a = (i / n) * Math.PI * 2;
    const r = m.r * m.bumps[i];
    const x = Math.cos(a) * r;
    const y = Math.sin(a) * r;
    if (i === 0) ctx.moveTo(x, y);
    else ctx.lineTo(x, y);
  }
  ctx.closePath();
  ctx.fill();
  ctx.strokeStyle = '#3a2a1a';
  ctx.lineWidth = 2;
  ctx.stroke();
  ctx.fillStyle = '#4a3a2a';
  m.craters.forEach(c => {
    ctx.beginPath();
    ctx.arc(c.x*m.r, c.y*m.r, c.s*m.r, 0, Math.PI*2);
    ctx.fill();
  });
  ctx.restore();
}

function drawEnemy(e) {
  ctx.fillStyle = e.type === 'fast' ? '#f0f' : '#f80';
  ctx.beginPath();
  if (e.type === 'fast') {
    ctx.moveTo(e.x, e.y + e.h/2);
    ctx.lineTo(e.x - e.w/2, e.y + e.h/4);
    ctx.lineTo(e.x - e.w/3, e.y - e.h/2);
    ctx.lineTo(e.x + e.w/3, e.y - e.h/2);
    ctx.lineTo(e.x + e.w/2, e.y + e.h/4);
  } else {
    ctx.moveTo(e.x, e.y + e.h/2);
    ctx.lineTo(e.x - e.w/2, e.y - e.h/3);
    ctx.lineTo(e.x - e.w/6, e.y - e.h/5);
    ctx.lineTo(e.x, e.y - e.h/2);
    ctx.lineTo(e.x + e.w/6, e.y - e.h/5);
    ctx.lineTo(e.x + e.w/2, e.y - e.h/3);
  }
  ctx.closePath();
  ctx.fill();
  ctx.fillStyle = '#ff0';
  ctx.fillRect(e.x-2, e.y-2, 4, 4);
}

function render() {
  ctx.setTransform(1, 0, 0, 1, 0, 0);
  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, W, H);

  if (state.shake > 0) {
    const dx = (Math.random() - 0.5) * state.shake;
    const dy = (Math.random() - 0.5) * state.shake;
    ctx.setTransform(1, 0, 0, 1, dx, dy);
    state.shake *= 0.85;
    if (state.shake < 0.3) state.shake = 0;
  }

  ctx.fillStyle = '#fff';
  state.stars.forEach(s => {
    ctx.globalAlpha = s.size / 2;
    ctx.fillRect(s.x, s.y, s.size, s.size);
  });
  ctx.globalAlpha = 1;

  if (!state.gameOver) {
    const inv = state.player.invincible;
    if (inv === 0 || Math.floor(inv / 4) % 2 === 0) {
      drawShip(state.player.x, state.player.y, '#0f0');
    }
  }

  ctx.fillStyle = '#ff0';
  state.bullets.forEach(b => {
    ctx.fillRect(b.x-2, b.y-8, 4, 12);
  });

  ctx.fillStyle = '#f44';
  state.enemyBullets.forEach(b => {
    ctx.beginPath();
    ctx.arc(b.x, b.y, 4, 0, Math.PI*2);
    ctx.fill();
  });

  state.meteors.forEach(drawMeteor);

  state.enemies.forEach(drawEnemy);

  state.items.forEach(it => {
    const pulse = 0.85 + Math.sin(Date.now()/150) * 0.15;
    ctx.save();
    ctx.globalAlpha = pulse;
    drawHeart(it.x, it.y, 9, '#0f8');
    ctx.restore();
  });

  state.particles.forEach(pt => {
    ctx.globalAlpha = pt.life / 30;
    ctx.fillStyle = pt.color;
    ctx.fillRect(pt.x-1.5, pt.y-1.5, 3, 3);
  });
  ctx.globalAlpha = 1;

  if (!state.gameOver) drawHearts(state.player.x, state.player.y + 22, state.lives);

  if (state.lives === 1 && !state.gameOver) {
    const pulse = 0.6 + Math.sin(Date.now() / 200) * 0.2;
    const thickness = 0.12;
    const edges = [
      { g: ctx.createLinearGradient(0, 0, 0, H*thickness), x: 0, y: 0, w: W, h: H*thickness, from: pulse, to: 0 },
      { g: ctx.createLinearGradient(0, H*(1-thickness), 0, H), x: 0, y: H*(1-thickness), w: W, h: H*thickness, from: 0, to: pulse },
      { g: ctx.createLinearGradient(0, 0, W*thickness, 0), x: 0, y: 0, w: W*thickness, h: H, from: pulse, to: 0 },
      { g: ctx.createLinearGradient(W*(1-thickness), 0, W, 0), x: W*(1-thickness), y: 0, w: W*thickness, h: H, from: 0, to: pulse },
    ];
    edges.forEach(e => {
      e.g.addColorStop(0, 'rgba(255,0,0,' + e.from + ')');
      e.g.addColorStop(1, 'rgba(255,0,0,' + e.to + ')');
      ctx.fillStyle = e.g;
      ctx.fillRect(e.x, e.y, e.w, e.h);
    });
  }

  ctx.fillStyle = '#0f0';
  ctx.font = 'bold 18px Courier New';
  ctx.textAlign = 'left';
  ctx.fillText('SCORE: ' + state.score, 10, 25);
  ctx.fillText('WAVE: ' + state.wave, 10, 48);
}

function drawHeart(cx, cy, size, color) {
  ctx.fillStyle = color;
  const w = size;
  const h = size * 1.1;
  const top = cy - h * 0.35;
  const bottom = cy + h * 0.55;
  ctx.beginPath();
  ctx.moveTo(cx, top + h * 0.25);
  ctx.bezierCurveTo(cx - w*0.1, top - h*0.15, cx - w, top - h*0.05, cx - w, top + h*0.3);
  ctx.bezierCurveTo(cx - w, top + h*0.55, cx - w*0.5, top + h*0.75, cx, bottom);
  ctx.bezierCurveTo(cx + w*0.5, top + h*0.75, cx + w, top + h*0.55, cx + w, top + h*0.3);
  ctx.bezierCurveTo(cx + w, top - h*0.05, cx + w*0.1, top - h*0.15, cx, top + h*0.25);
  ctx.closePath();
  ctx.fill();
}

function drawHearts(cx, cy, lives) {
  const size = 7;
  const gap = 18;
  const total = Math.max(0, lives);
  const startX = cx - (total - 1) * gap / 2;
  for (let i = 0; i < total; i++) {
    drawHeart(startX + i * gap, cy, size, '#f22');
  }
}

function loop() {
  update();
  render();
  requestAnimationFrame(loop);
}

loop();
</script>
</body>
</html>
